<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover lets us read safe-area insets; interactive-widget keeps layout stable when on-screen UI appears -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CuteDefense</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Lock the document to the visible area: no scrolling, no rubber-banding.
               The exact pixel size is set from JS using visualViewport so Android
               Chrome's URL bar / bottom toolbar can never hide the bottom of the game. */
            overflow: hidden;
            position: fixed;
            inset: 0;
            background: #000000;
            font-family: Arial, sans-serif;
            overscroll-behavior: none;
            touch-action: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: #98FB98;
            /* Display size is set explicitly from JS (fitCanvasToViewport). */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #debug-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        /* Fullscreen toggle — Android Chrome has no menu option for this, so we
           expose the Fullscreen API behind a button. Hidden automatically once
           the page is actually in fullscreen. */
        #fullscreen-btn {
            position: absolute;
            top: calc(8px + env(safe-area-inset-top, 0px));
            right: calc(8px + env(safe-area-inset-right, 0px));
            z-index: 20;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 22px;
            line-height: 44px;
            text-align: center;
            cursor: pointer;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        #fullscreen-btn:active {
            background: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>

<body>
    <div id="debug-info">
        <div>Debug: D</div>
        <div>Grid: G</div>
        <div>Path: P</div>
        <div>Collision: C</div>
        <div>Mute: M</div>
    </div>
    <button id="fullscreen-btn" title="Toggle fullscreen" aria-label="Toggle fullscreen">⛶</button>
    <div id="audio-hint"
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; text-align: center; z-index: 1000; display: none;">
        <div>🎵 Click anywhere to enable audio</div>
    </div>
    <canvas id="gameCanvas" width="2514" height="1154"></canvas>

    <!--
      Version router (shared infra). Reads the `v` query parameter:
        ?v=2            -> load V2 (ES modules)
        (none) / ?v=1   -> load V1 (default, unchanged)
      Optional ?bench=1 appends each version's benchmark harness.

      V1 is loaded via document.write during initial parse so its scripts stay
      parser-inserted and in the original order — V1's DOMContentLoaded init and
      behaviour are byte-for-byte unchanged from before the router existed.
    -->
    <script>
        (function () {
            var params = new URLSearchParams(location.search);
            var version = params.get('v') === '2' ? 2 : 1; // V1 is the default
            var bench = params.get('bench') === '1';

            if (version === 2) {
                // V2 ships as native ES modules (no bundler), so it can be a single
                // deferred module entry. ?bench is read inside the V2 app.
                document.write('<script type="module" src="v2/main.js?v=2"><\/script>');
                return;
            }

            // V1 — exact original load order, now emitted by the router.
            var v1Scripts = [
                'src/systems/ResponsiveScalingSystem.js',
                'src/systems/GridSystem.js',
                'src/systems/InputSystem.js',
                'src/systems/RenderSystem.js',
                'src/data/colorPalette.js',
                'src/data/enemyTypes.js',
                'src/systems/EnemySystem.js',
                'src/systems/BossEnemySystem.js',
                'src/managers/EnemyManager.js',
                'src/data/towerTypes.js',
                'src/systems/TowerSystem.js',
                'src/systems/ResourceSystem.js',
                'src/managers/TowerManager.js',
                'src/managers/GameStateManager.js',
                'src/managers/AudioManager.js',
                'src/systems/LoggerSystem.js',
                'src/game.js?v=3'
            ];
            // V1 benchmarking hook (new file; existing V1 files untouched).
            if (bench) v1Scripts.push('src/systems/BenchHarness.js');
            for (var i = 0; i < v1Scripts.length; i++) {
                document.write('<script src="' + v1Scripts[i] + '"><\/script>');
            }
        })();
    </script>
</body>

</html>
