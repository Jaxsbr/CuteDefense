<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover lets us read safe-area insets; interactive-widget keeps layout stable when on-screen UI appears -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CuteDefense</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Lock the document to the visible area: no scrolling, no rubber-banding.
               The exact pixel size is set from JS using visualViewport so Android
               Chrome's URL bar / bottom toolbar can never hide the bottom of the game. */
            overflow: hidden;
            position: fixed;
            inset: 0;
            background: #000000;
            font-family: Arial, sans-serif;
            overscroll-behavior: none;
            touch-action: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: #98FB98;
            /* Display size is set explicitly from JS (fitCanvasToViewport). */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #debug-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        /* Fullscreen toggle — Android Chrome has no menu option for this, so we
           expose the Fullscreen API behind a button. Hidden automatically once
           the page is actually in fullscreen. */
        #fullscreen-btn {
            position: absolute;
            top: calc(8px + env(safe-area-inset-top, 0px));
            right: calc(8px + env(safe-area-inset-right, 0px));
            z-index: 20;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 22px;
            line-height: 44px;
            text-align: center;
            cursor: pointer;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        #fullscreen-btn:active {
            background: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>

<body>
    <div id="debug-info">
        <div>Debug: D</div>
        <div>Grid: G</div>
        <div>Path: P</div>
        <div>Collision: C</div>
        <div>Mute: M</div>
    </div>
    <button id="fullscreen-btn" title="Toggle fullscreen" aria-label="Toggle fullscreen">⛶</button>
    <div id="audio-hint"
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; text-align: center; z-index: 1000; display: none;">
        <div>🎵 Click anywhere to enable audio</div>
    </div>
    <canvas id="gameCanvas" width="2514" height="1154"></canvas>
    <script src="src/systems/ResponsiveScalingSystem.js"></script>
    <script src="src/systems/GridSystem.js"></script>
    <script src="src/systems/InputSystem.js"></script>
    <script src="src/systems/RenderSystem.js"></script>
    <script src="src/data/colorPalette.js"></script>
    <script src="src/data/enemyTypes.js"></script>
    <script src="src/systems/EnemySystem.js"></script>
    <script src="src/systems/BossEnemySystem.js"></script>
    <script src="src/managers/EnemyManager.js"></script>
    <script src="src/data/towerTypes.js"></script>
    <script src="src/systems/TowerSystem.js"></script>
    <script src="src/systems/ResourceSystem.js"></script>
    <script src="src/managers/TowerManager.js"></script>
    <script src="src/managers/GameStateManager.js"></script>
    <script src="src/managers/AudioManager.js"></script>
    <script src="src/systems/LoggerSystem.js"></script>
    <script src="src/game.js?v=3"></script>
</body>

</html>
